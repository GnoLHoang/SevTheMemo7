<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Kỷ Yếu Lớp</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            padding: 10px;
            background: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transform: rotate(calc(-3deg + 6deg * var(--rand, 0.5)));
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05) rotate(0);
            z-index: 10;
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: sepia(0.3) contrast(1.1);
        }

        .gallery-item p {
            text-align: center;
            font-family: var(--f-heading);
            font-style: italic;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* Lightbox CSS */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
        }

        .lightbox img {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 10px solid #fff;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="page-wrapper animate-fade-in">
        <main style="flex: 1; padding: 2rem 0;">
            <div class="gallery-header">
                <div>
                    <h1 style="font-size: 3rem; margin-bottom:0;">Thư Viện Ảnh</h1>
                    <p style="font-style: italic; opacity: 0.8;">Lưu giữ những khoảnh khắc đẹp nhất.</p>
                </div>
                <button class="btn" onclick="alert('Tính năng tải ảnh lên đang được phát triển!')">📸 Tải Ảnh
                    Lên</button>
            </div>

            <div class="gallery-grid" id="galleryGrid">
                <!-- Data will be injected -->
            </div>
        </main>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close" onclick="document.getElementById('lightbox').style.display='none'">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script src="script.js"></script>
    <script>
        const photos = [
            { id: 1, src: "assets/1.jpg", caption: "" },
            { id: 2, src: "assets/2.jpg", caption: "" },
            { id: 3, src: "assets/3.jpg", caption: "" },
            { id: 4, src: "assets/4.jpg", caption: "" },
            { id: 5, src: "assets/5.jpg", caption: "" },
            { id: 7, src: "assets/7.jpg", caption: "" },
            { id: 8, src: "assets/8.jpg", caption: "" },
            { id: 9, src: "assets/9.jpg", caption: "" },
            { id: 10, src: "assets/10.jpg", caption: "" },
            { id: 11, src: "assets/11.jpg", caption: "" },
            { id: 12, src: "assets/12.jpg", caption: "" },
            { id: 13, src: "assets/13.jpg", caption: "" },
            { id: 14, src: "assets/14.jpg", caption: "" },
            { id: 15, src: "assets/15.jpg", caption: "" },
            { id: 16, src: "assets/16.jpg", caption: "" },
            { id: 17, src: "assets/17.jpg", caption: "" },
            { id: 18, src: "assets/18.jpg", caption: "" },
            { id: 19, src: "assets/19.jpg", caption: "" },
            { id: 20, src: "assets/20.jpg", caption: "" },
            { id: 21, src: "assets/21.jpg", caption: "" },
        ];

        const grid = document.getElementById('galleryGrid');

        photos.forEach(p => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            // Set random rotation to simulate dropped polaroids
            item.style.setProperty('--rand', Math.random());

            item.innerHTML = `
                <img src="${p.src}" alt="${p.caption}">
                <p>"${p.caption}"</p>
            `;

            item.onclick = () => {
                document.getElementById('lightbox').style.display = 'block';
                document.getElementById('lightbox-img').src = p.src;
            };

            grid.appendChild(item);
        });
    </script>
</body>

</html>
